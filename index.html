<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معرض المشاريع — تجربة غامرة</title>
  <meta name="description" content="تجربة معرض غامرة على غرار jenamdvacetpet.cz — أجنحة ومشاريع مرقّمة داخل مركز معارض." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <!-- ============================================================= -->
  <!-- القسم 1 — شاشة التحميل (Loading Screen + العدّاد)             -->
  <!-- ============================================================= -->
  <section id="section-1-loading" class="screen loading is-active" data-screen="loading">
    <div class="loading__center">
      <div class="loading__icon">📕</div>
      <h1 class="loading__tagline">25 عامًا من العلم<br/>والإبداع والنمو.</h1>
    </div>
    <div class="loading__counter" id="loadCounter">0</div>
    <div class="ribbon">25</div>
  </section>

  <!-- ============================================================= -->
  <!-- القسم 3 — الشريط العلوي (Top Chrome: logo / sound / lang)     -->
  <!-- (يظهر فوق الخريطة والمحطات)                                   -->
  <!-- ============================================================= -->
  <header id="section-3-chrome" class="chrome" hidden>
    <a class="chrome__logo" href="#" id="logoHome">
      <span class="chrome__logo-mark">▦</span>
      <span class="chrome__logo-text">معرض المشاريع</span>
    </a>
    <div class="chrome__right">
      <button class="chrome__btn" id="soundBtn" aria-label="الصوت">♪</button>
      <button class="chrome__btn chrome__lang" id="langBtn">AR</button>
    </div>
  </header>

  <!-- ============================================================= -->
  <!-- القسم 2 — المقدمة (Intro: كلمات تظهر واحدة واحدة)             -->
  <!-- ============================================================= -->
  <section id="section-2-intro" class="screen intro" data-screen="intro" hidden>
    <div class="venue-bg" aria-hidden="true"></div>
    <div class="intro__words" id="introWords">
      <span class="intro__word">مركز</span>
      <span class="intro__word">المعارض</span>
      <span class="intro__word">السعودي</span>
    </div>
    <div class="ribbon">25</div>
    <div class="credit">powered by <b>YOURSTUDIO</b></div>
  </section>

  <!-- ============================================================= -->
  <!-- القسم 4 — الخريطة / القاعة بالنقاط المرقّمة (Venue Map)       -->
  <!-- ============================================================= -->
  <section id="section-4-map" class="screen map" data-screen="map" hidden>
    <div class="venue-bg venue-bg--map" aria-hidden="true">
      <div class="venue-floor"></div>
      <div class="venue-glow"></div>
    </div>

    <h2 class="map__hint">اختر مشروعًا للدخول</h2>

    <!-- النقاط المرقّمة تُحقَن هنا تلقائيًا من script.js (قائمة STATIONS) -->
    <div class="hotspots" id="hotspots"></div>

    <button class="map__timeline" id="timelineBtn">القائمة الكاملة</button>
    <div class="ribbon">25</div>
    <div class="credit">powered by <b>YOURSTUDIO</b></div>
  </section>

  <!-- ============================================================= -->
  <!-- القسم 5 — محطة المشروع (Station: عنوان + رقم عملاق)           -->
  <!-- ============================================================= -->
  <section id="section-5-station" class="screen station" data-screen="station" hidden>
    <div class="venue-bg venue-bg--zoom" aria-hidden="true">
      <!-- مكان صورة جناح المشروع (استبدلها لاحقًا) -->
      <div class="station__booth" id="stationBooth"></div>
    </div>
    <button class="nav-close" id="stationClose" aria-label="إغلاق">✕</button>
    <button class="nav-arrow nav-arrow--prev" data-nav="prev" aria-label="السابق">‹</button>
    <button class="nav-arrow nav-arrow--next" data-nav="next" aria-label="التالي">›</button>

    <h2 class="station__title" id="stationTitle">عنوان المشروع</h2>
    <div class="station__num" id="stationNum">01</div>

    <button class="station__scroll" id="openStory">
      <span class="station__mouse"></span>
      <span>اعرف القصة</span>
    </button>
    <div class="ribbon">25</div>
  </section>

  <!-- ============================================================= -->
  <!-- القسم 6 — لوحة القصة (Story Panel: صورة + عنوان + نص + ترقيم) -->
  <!-- ============================================================= -->
  <section id="section-6-story" class="screen story" data-screen="story" hidden>
    <button class="nav-close" id="storyClose" aria-label="إغلاق">✕</button>

    <div class="story__scroll" id="storyScroll">
      <!-- شريحة القصة (تتغيّر بالترقيم) -->
      <figure class="story__media">
        <img id="storyImg" src="assets/placeholder.svg" alt="" />
        <figcaption class="story__caption" id="storyCaption"></figcaption>
      </figure>
      <div class="story__body">
        <h3 class="story__heading" id="storyHeading"></h3>
        <p class="story__text" id="storyText"></p>
      </div>
    </div>

    <!-- القسم 7 — أدوات الترقيم/التنقّل (Footer pagination) -->
    <footer class="story__footer" id="section-7-nav">
      <span class="story__section" id="storySection"></span>
      <div class="story__pager">
        <button class="pager__btn" data-page="prev" aria-label="السابق">‹</button>
        <span class="pager__count" id="storyCount">1/1</span>
        <button class="pager__btn" data-page="next" aria-label="التالي">›</button>
      </div>
    </footer>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
